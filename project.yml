name: QuickMD
options:
  bundleIdPrefix: com.quickmd
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.5.0"

targets:
  QuickMD:
    type: application
    platform: macOS
    sources:
      - path: QuickMD
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickmd.app
        PRODUCT_NAME: QuickMD
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_FILE: QuickMD/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickMD/QuickMD.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: MarkdownPreview
        embed: true
        codeSign: true

  MarkdownPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: MarkdownPreview
        excludes:
          - Resources
      - path: Shared
      - path: MarkdownPreview/Resources/katex.min.js
        buildPhase: resources
      - path: MarkdownPreview/Resources/katex.min.css
        buildPhase: resources
      - path: MarkdownPreview/Resources/auto-render.min.js
        buildPhase: resources
      - path: MarkdownPreview/Resources/highlight.min.js
        buildPhase: resources
      - path: MarkdownPreview/Resources/github-markdown.css
        buildPhase: resources
      - path: MarkdownPreview/Resources/katex-fonts
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickmd.app.markdownpreview
        PRODUCT_NAME: MarkdownPreview
        INFOPLIST_FILE: MarkdownPreview/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownPreview/MarkdownPreview.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    dependencies:
      - package: swift-markdown
        product: Markdown
